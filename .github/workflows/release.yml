name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create Universal Binary
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/x86_64-apple-darwin/release/clipvault \
            target/aarch64-apple-darwin/release/clipvault \
            -output target/universal-apple-darwin/release/clipvault

      - name: Package DMG
        run: |
          mkdir -p dmg_contents
          cp target/universal-apple-darwin/release/clipvault dmg_contents/
          hdiutil create -volname "ClipVault" -srcfolder dmg_contents -ov -format UDZO ClipVault.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClipVault.dmg
            target/x86_64-apple-darwin/release/clipvault
            target/aarch64-apple-darwin/release/clipvault
          generate_release_notes: true
